services:
  - type: web
    name: schooltimetable-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 90 --graceful-timeout 15 --log-level info --access-logfile - --error-logfile -
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
